<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simples Nacional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 150vh; /* Altura maior para permitir scroll */
            position: relative;
            overflow-x: hidden;
            display: flex;
            align-items: flex-start; /* Alinha o conteúdo no topo */
            justify-content: center;
            padding-top: 80px; /* Espaço no topo */
        }

        /* Fundo embaçado mais visível */
        .background-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .background-blur iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Reduzi o blur e aumentei a opacidade/brilho */
            filter: blur(5px) brightness(0.6) opacity(0.45);
            transform: scale(1.05);
            object-fit: cover;
        }

        /* Container principal */
        .main-card {
            position: relative;
            z-index: 1;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            max-width: 500px;
            width: 90%;
            margin-bottom: 60px; /* Espaço extra abaixo do card */
        }

        .main-card h1 {
            font-size: 2.8em;
            font-weight: 300;
            letter-spacing: 2px;
            color: #f0f0f0;
            margin-bottom: 15px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .main-card .subtitle {
            color: #ccc;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .main-card .info-source {
            font-size: 0.9em;
            color: #FFCC00;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            width: 100%;
            max-width: 280px;
            backdrop-filter: blur(5px);
        }

        .btn-emitir {
            background: rgba(0, 153, 102, 0.9);
            color: white;
            border-color: #00b377;
        }

        .btn-emitir:hover {
            background: #00b377;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 153, 102, 0.4);
        }

        .btn-carajas {
            background: rgba(0, 89, 156, 0.9);
            color: white;
            border-color: #0077cc;
        }

        .btn-carajas:hover {
            background: #0077cc;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 89, 156, 0.4);
        }

        /* Pequeno texto para indicar rolagem (opcional) */
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 0.9em;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }

        @media (max-width: 600px) {
            .main-card h1 {
                font-size: 2em;
            }
            .main-card {
                padding: 30px 25px;
            }
        }
    </style>
</head>
<body>
    <!-- Fundo embaçado -->
    <div class="background-blur">
        <iframe src="https://www8.receita.fazenda.gov.br/SimplesNacional/"></iframe>
    </div>

    <!-- Conteúdo principal simplificado -->
    <div class="main-card">
        <h1>SIMPLES NACIONAL</h1>
        <p class="subtitle">Regime Tributário Diferenciado para Micro e Pequenas Empresas</p>
        <p class="info-source">Informações oficiais baseadas na Receita Federal</p>

        <div class="buttons">
            <a href="https://www8.receita.fazenda.gov.br/SimplesNacional/Simei/Default.aspx" target="_blank" class="action-btn btn-emitir">
                📄 Emitir DAS MEI
            </a>
            <a href="https://www.carajas.com.br" target="_blank" class="action-btn btn-carajas">
                🌐 Simples Nacional
            </a>
        </div>
    </div>

    <!-- Indicador sutil de rolagem (opcional, pode remover se quiser) -->
    <div class="scroll-hint">role para baixo ↓</div>
</body>
</html>
