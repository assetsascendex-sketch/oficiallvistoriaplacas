<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simples Nacional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0a;
            height: 2000px;
            position: relative;
            overflow-x: hidden;
        }

        .background-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .background-blur iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: blur(5px) brightness(0.6) opacity(0.45);
            transform: scale(1.05);
        }

        .main-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            background: #f0f2f5;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 25px 20px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-width: 420px;
            width: 90%;
            pointer-events: auto;
        }

        /* Logo maior, sem texto adicional */
        .logo-grande {
            width: 200px;       /* antes era 100px */
            height: auto;
            margin-bottom: 15px;
        }

        .subtitle {
            color: #444;
            font-size: 0.95rem;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            width: 100%;
            max-width: 240px;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-emitir {
            background: #009966;
        }
        .btn-emitir:hover {
            background: #008855;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,153,102,0.4);
        }

        .btn-carajas {
            background: #00599C;
        }
        .btn-carajas:hover {
            background: #003f6e;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,89,156,0.4);
        }
    </style>
</head>
<body>
    <div class="background-blur">
        <iframe src="https://www8.receita.fazenda.gov.br/SimplesNacional/"></iframe>
    </div>

    <div class="main-card">
        <!-- Imagem maior, substituindo o título -->
        <img src="https://www8.receita.fazenda.gov.br/SimplesNacional/img/marca_Simples.png" 
             alt="Simples Nacional" 
             class="logo-grande">

        <p class="subtitle">Programa Gerador de DAS do Microempreendedor Individual</p>

        <div class="buttons">
            <a href="https://www8.receita.fazenda.gov.br/SimplesNacional/Simei/Default.aspx" target="_blank" class="action-btn btn-emitir">
                📄 Emitir DAS MEI
            </a>
            <a href="https://www.carajas.com.br" target="_blank" class="action-btn btn-carajas">
                🌐 Simples Nacional
            </a>
        </div>
    </div>
</body>
</html>
