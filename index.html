<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simples Nacional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            height: 2000px; /* Altura para rolagem */
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo embaçado ocupa toda a altura da página */
        .background-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%; /* 100% do body (2000px) */
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .background-blur iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: blur(5px) brightness(0.6) opacity(0.45);
            transform: scale(1.05);
            object-fit: cover;
        }

        /* Card fixo no centro, verde translúcido */
        .main-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            background: rgba(0, 100, 50, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 180, 90, 0.3);
            border-radius: 12px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            max-width: 500px;
            width: 90%;
            pointer-events: auto;
        }

        .main-card h1 {
            font-size: 2.8em;
            font-weight: 300;
            letter-spacing: 2px;
            color: #f0f0f0;
            margin-bottom: 15px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .main-card .subtitle {
            color: #e0e0e0;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .main-card .info-source {
            font-size: 0.9em;
            color: #FFE066;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            width: 100%;
            max-width: 280px;
            backdrop-filter: blur(5px);
        }

        .btn-emitir {
            background: rgba(0, 153, 102, 0.9);
            color: white;
            border-color: #00b377;
        }

        .btn-emitir:hover {
            background: #00b377;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 153, 102, 0.4);
        }

        .btn-carajas {
            background: rgba(0, 89, 156, 0.9);
            color: white;
            border-color: #0077cc;
        }

        .btn-carajas:hover {
            background: #0077cc;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 89, 156, 0.4);
        }

        @media (max-width: 600px) {
            .main-card h1 {
                font-size: 2em;
            }
            .main-card {
                padding: 30px 25px;
            }
        }
    </style>
</head>
<body>
    <!-- Fundo embaçado ocupa 100% da altura do body -->
    <div class="background-blur">
        <iframe src="https://www8.receita.fazenda.gov.br/SimplesNacional/"></iframe>
    </div>

    <!-- Card fixo com botões -->
    <div class="main-card">
        <h1>SIMPLES NACIONAL</h1>
        <p class="subtitle">Regime Tributário Diferenciado para Micro e Pequenas Empresas</p>
        <p class="info-source">Informações oficiais baseadas na Receita Federal</p>

        <div class="buttons">
            <a href="https://www8.receita.fazenda.gov.br/SimplesNacional/Simei/Default.aspx" target="_blank" class="action-btn btn-emitir">
                📄 Emitir DAS MEI
            </a>
            <a href="https://www.carajas.com.br" target="_blank" class="action-btn btn-carajas">
                🌐 Simples Nacional
            </a>
        </div>
    </div>
</body>
</html>
