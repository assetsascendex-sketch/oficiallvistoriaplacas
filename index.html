<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simples Nacional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0a;
            height: 2000px; /* permite rolagem */
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo embaçado com o site da Receita */
        .background-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .background-blur iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: blur(5px) brightness(0.6) opacity(0.45);
            transform: scale(1.05);
        }

        /* Card principal com fundo cinza (estilo Receita) */
        .main-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            background: #f0f2f5; /* cinza claro governamental */
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-width: 420px;
            width: 90%;
            pointer-events: auto;
        }

        /* Imagem da marca do Simples Nacional */
        .logo-img {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
        }

        .main-card h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #00599C; /* azul da Receita */
            margin-bottom: 8px;
        }

        .main-card .subtitle {
            color: #444;
            font-size: 0.95rem;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        /* Estilo PGMEI: botões azul e verde */
        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            width: 100%;
            max-width: 240px;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-emitir {
            background: #009966;
        }
        .btn-emitir:hover {
            background: #008855;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,153,102,0.4);
        }

        .btn-carajas {
            background: #00599C;
        }
        .btn-carajas:hover {
            background: #003f6e;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,89,156,0.4);
        }

        @media (max-width: 600px) {
            .main-card h1 {
                font-size: 1.5rem;
            }
            .logo-img {
                width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="background-blur">
        <iframe src="https://www8.receita.fazenda.gov.br/SimplesNacional/"></iframe>
    </div>

    <div class="main-card">
        <!-- Marca oficial do Simples Nacional -->
        <img src="https://www8.receita.fazenda.gov.br/SimplesNacional/img/marca_Simples.png" alt="Simples Nacional" class="logo-img">

        <h1>SIMPLES NACIONAL</h1>
        <p class="subtitle">Programa Gerador de DAS do Microempreendedor Individual</p>

        <div class="buttons">
            <a href="https://www8.receita.fazenda.gov.br/SimplesNacional/Simei/Default.aspx" target="_blank" class="action-btn btn-emitir">
                📄 Emitir DAS MEI
            </a>
            <a href="https://www.carajas.com.br" target="_blank" class="action-btn btn-carajas">
                🌐 Simples Nacional
            </a>
        </div>
    </div>
</body>
</html>
