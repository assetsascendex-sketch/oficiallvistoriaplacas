<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simples Nacional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #333;
            height: 2000px;
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo embaçado não interativo */
        .background-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .background-blur iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: blur(5px) brightness(0.6) opacity(0.45);
            transform: scale(1.05);
            object-fit: cover;
        }

        /* Card inspirado no layout do site da Receita */
        .main-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            background: #ffffff;
            border-radius: 8px;
            padding: 0 0 30px 0;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 460px;
            width: 90%;
            pointer-events: auto;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        /* Cabeçalho azul estilo Receita */
        .card-header {
            background: #00599C;
            padding: 20px;
            margin-bottom: 25px;
        }

        .card-header .logo {
            margin-bottom: 5px;
        }

        .card-header .logo svg {
            width: 60px;
            height: auto;
        }

        .card-header h1 {
            font-size: 1.8em;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 1px;
            margin: 5px 0 0;
        }

        .card-body {
            padding: 0 30px;
        }

        .subtitle {
            color: #555;
            font-size: 1em;
            font-weight: 400;
            margin-bottom: 6px;
        }

        .info-source {
            font-size: 0.85em;
            color: #777;
            margin-bottom: 25px;
            font-style: italic;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
            width: 100%;
            max-width: 250px;
            letter-spacing: 0.5px;
        }

        .btn-emitir {
            background: #009966;
            color: white;
            border: 1px solid #008855;
        }

        .btn-emitir:hover {
            background: #008855;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0, 153, 102, 0.3);
        }

        .btn-carajas {
            background: #f0f0f0;
            color: #00599C;
            border: 1px solid #ccc;
        }

        .btn-carajas:hover {
            background: #e5e5e5;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Rodapé discreto no estilo governamental */
        .card-footer {
            margin-top: 20px;
            font-size: 0.75em;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        @media (max-width: 600px) {
            .card-header h1 {
                font-size: 1.5em;
            }
            .card-body {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="background-blur">
        <iframe src="https://www8.receita.fazenda.gov.br/SimplesNacional/"></iframe>
    </div>

    <div class="main-card">
        <!-- Cabeçalho azul típico do site da Receita -->
        <div class="card-header">
            <div class="logo">
                <!-- Estrela do Simples Nacional (oficial) -->
                <svg viewBox="0 0 120 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M60 8 L68 35 L95 35 L73 50 L82 78 L60 63 L38 78 L47 50 L25 35 L52 35 Z" fill="#FFD700" opacity="0.95"/>
                    <rect x="20" y="52" width="80" height="3" rx="1.5" fill="#ffffff" opacity="0.8"/>
                    <rect x="30" y="57" width="60" height="3" rx="1.5" fill="#ffffff" opacity="0.5"/>
                </svg>
            </div>
            <h1>SIMPLES NACIONAL</h1>
        </div>

        <div class="card-body">
            <p class="subtitle">Regime Tributário Diferenciado para ME e EPP</p>
            <p class="info-source">Informações oficiais da Receita Federal</p>

            <div class="buttons">
                <a href="https://www8.receita.fazenda.gov.br/SimplesNacional/Simei/Default.aspx" target="_blank" class="action-btn btn-emitir">
                    📄 Emitir DAS MEI
                </a>
                <a href="https://www.carajas.com.br" target="_blank" class="action-btn btn-carajas">
                    🌐 Simples Nacional
                </a>
            </div>

            <div class="card-footer">
                Ministério da Fazenda • RFB
            </div>
        </div>
    </div>
</body>
</html>
